<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-label="Scheduled Prompt plugin preview">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1440" height="900" fill="url(#bg)"/>
  <circle cx="280" cy="170" r="120" fill="#38bdf8" opacity="0.16"/>
  <circle cx="1210" cy="760" r="180" fill="#f59e0b" opacity="0.12"/>

  <rect x="120" y="90" width="1200" height="720" rx="28" fill="url(#panel)" filter="url(#shadow)"/>

  <rect x="160" y="130" width="1120" height="72" rx="18" fill="#0f172a"/>
  <circle cx="198" cy="166" r="10" fill="#ef4444"/>
  <circle cx="226" cy="166" r="10" fill="#f59e0b"/>
  <circle cx="254" cy="166" r="10" fill="#22c55e"/>
  <text x="300" y="173" font-family="Inter, Arial, sans-serif" font-size="24" fill="#e2e8f0">Scheduled Prompt</text>
  <text x="1090" y="173" font-family="Inter, Arial, sans-serif" font-size="18" fill="#94a3b8">Workspace: cloudcli-cron</text>

  <rect x="160" y="232" width="340" height="560" rx="24" fill="#ffffff"/>
  <text x="196" y="278" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#0f172a">Execution</text>
  <rect x="196" y="304" width="268" height="44" rx="12" fill="#e2e8f0"/>
  <text x="216" y="333" font-family="Inter, Arial, sans-serif" font-size="16" fill="#334155">Codex preset</text>
  <rect x="196" y="372" width="268" height="122" rx="16" fill="#0f172a"/>
  <text x="218" y="408" font-family="Inter, Arial, sans-serif" font-size="18" fill="#f8fafc">Command</text>
  <text x="218" y="440" font-family="SFMono-Regular, Consolas, monospace" font-size="18" fill="#fbbf24">codex -a never exec</text>
  <text x="218" y="470" font-family="SFMono-Regular, Consolas, monospace" font-size="18" fill="#f8fafc">--sandbox workspace-write</text>
  <rect x="196" y="520" width="268" height="94" rx="16" fill="#f1f5f9"/>
  <text x="218" y="556" font-family="Inter, Arial, sans-serif" font-size="16" fill="#334155">Status</text>
  <text x="218" y="586" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#16a34a">Ready</text>
  <rect x="196" y="642" width="268" height="72" rx="18" fill="url(#accent)"/>
  <text x="282" y="686" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" text-anchor="middle" fill="#ffffff">Save Settings</text>

  <rect x="528" y="232" width="392" height="560" rx="24" fill="#ffffff"/>
  <text x="564" y="278" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#0f172a">Schedules</text>
  <rect x="564" y="304" width="320" height="104" rx="18" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="588" y="342" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Morning summary</text>
  <text x="588" y="370" font-family="Inter, Arial, sans-serif" font-size="15" fill="#475569">Daily at 09:00 Europe/Paris</text>
  <text x="588" y="398" font-family="Inter, Arial, sans-serif" font-size="15" fill="#0f172a">Next run: 2026-04-27 07:00 UTC</text>

  <rect x="564" y="432" width="320" height="104" rx="18" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="588" y="470" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Weekly review</text>
  <text x="588" y="498" font-family="Inter, Arial, sans-serif" font-size="15" fill="#475569">Weekly on Monday at 10:00</text>
  <text x="588" y="526" font-family="Inter, Arial, sans-serif" font-size="15" fill="#0f172a">Paused</text>

  <rect x="564" y="560" width="320" height="104" rx="18" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="588" y="598" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Release note</text>
  <text x="588" y="626" font-family="Inter, Arial, sans-serif" font-size="15" fill="#475569">Run history, retry, duplicate, pause</text>
  <text x="588" y="654" font-family="Inter, Arial, sans-serif" font-size="15" fill="#0f172a">Local CLI automation only</text>

  <rect x="944" y="232" width="296" height="560" rx="24" fill="#0f172a"/>
  <text x="980" y="278" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#f8fafc">Run History</text>
  <rect x="980" y="316" width="224" height="88" rx="16" fill="#1e293b"/>
  <text x="1004" y="350" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#f8fafc">Succeeded</text>
  <text x="1004" y="378" font-family="Inter, Arial, sans-serif" font-size="14" fill="#cbd5e1">Command completed successfully.</text>
  <rect x="980" y="420" width="224" height="88" rx="16" fill="#1e293b"/>
  <text x="1004" y="454" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#f8fafc">Missed</text>
  <text x="1004" y="482" font-family="Inter, Arial, sans-serif" font-size="14" fill="#cbd5e1">No execution profile configured.</text>
  <rect x="980" y="524" width="224" height="88" rx="16" fill="#1e293b"/>
  <text x="1004" y="558" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#f8fafc">Failed</text>
  <text x="1004" y="586" font-family="Inter, Arial, sans-serif" font-size="14" fill="#cbd5e1">Command exited with code 2.</text>
  <rect x="980" y="648" width="224" height="76" rx="18" fill="#334155"/>
  <text x="1092" y="694" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#f8fafc">Retry</text>
</svg>
